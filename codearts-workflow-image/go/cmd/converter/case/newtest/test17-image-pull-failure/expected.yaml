apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
    generateName: testorg-testrepo-test17-
    labels:
        jobPRID: "17"
        jobRepositoryName: testorg-testrepo-test17
        kubernetes.io/arch: arm64
        pipeline/run-id: test17-image-pull-failure-123
spec:
    policies:
        - event: PodFailed
          action: AbortJob
    queue: shared-flexible-queue
    maxRetry: 1
    minAvailable: 1
    ttlSecondsAfterFinished: 1800
    tasks:
        - name: main-script
          replicas: 1
          maxRetry: 1
          template:
            spec:
                containers:
                    - name: ascend
                      image: swr.cn-southwest-2.myhuaweicloud.com/nonexistent/invalid-image:does-not-exist
                      command:
                        - bash
                        - -c
                      args:
                        - |-
                          trap 'EXIT_CODE=$?; [ "$EXIT_CODE" -ne 0 ] && sleep 10' EXIT
                          #!/bin/bash
                          echo "This script should never run due to image pull failure"
                          echo "Using API token: $API_TOKEN"
                          echo "Using DB password: $DB_PASSWORD"
                      workingDir: /workspace
                      resources:
                        limits:
                            cpu: "8"
                            memory: 8Gi
                        requests:
                            cpu: "8"
                            memory: 8Gi
                      env:
                        - name: WORKSPACE
                          value: /workspace
                        - name: workspace
                          value: /workspace
                        - name: GOPROXY
                          value: http://cache-service.nginx-pypi-cache.svc.cluster.local:8084|https://goproxy.cn|direct
                        - name: GOSUMDB
                          value: sum.golang.google.cn
                        - name: API_TOKEN
                          value: secret-api-token-17
                        - name: DB_PASSWORD
                          value: secret-db-password-17
                        - name: MAX_JOBS
                          value: "8"
                        - name: CMAKE_BUILD_PARALLEL_LEVEL
                          value: "8"
                        - name: JOB_ID
                          value: job-17
                        - name: BUILDNUMBER
                          value: "1701"
                nodeSelector:
                    kubernetes.io/arch: arm64
                imagePullSecrets:
                    - name: huawei-swr-image-pull-secret-model-gy
                activeDeadlineSeconds: 14400
                securityContext:
                    runAsUser: 0
                restartPolicy: Never
