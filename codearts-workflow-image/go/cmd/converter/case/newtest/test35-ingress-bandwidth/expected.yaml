apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
    generateName: testorg-testrepo-test35-
    labels:
        jobPRID: "135"
        jobRepositoryName: testorg-testrepo-test35
        kubernetes.io/arch: amd64
        pipeline/run-id: test-5g-download-123
spec:
    policies:
        - event: PodFailed
          action: AbortJob
    queue: shared-flexible-queue
    maxRetry: 1
    minAvailable: 1
    ttlSecondsAfterFinished: 1800
    tasks:
        - name: main-script
          replicas: 1
          maxRetry: 1
          template:
            metadata:
                annotations:
                    kubernetes.io/ingress-bandwidth: 10M
            spec:
                containers:
                    - name: ascend
                      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.2.rc1-910b-ubuntu22.04-py3.11
                      command:
                        - bash
                        - -c
                      args:
                        - |
                          trap 'EXIT_CODE=$?; [ "$EXIT_CODE" -ne 0 ] && sleep 10' EXIT
                          #!/bin/sh
                          echo "Starting large repo download from gitcode.com..."
                          time git clone --progress https://gitcode.com/Ascend/pytorch.git
                          echo "Download complete"
                          du -sh pytorch/
                          ls -lh pytorch/ | head -20
                      workingDir: /workspace
                      resources:
                        limits:
                            cpu: "1"
                            memory: 1Gi
                        requests:
                            cpu: "1"
                            memory: 1Gi
                      env:
                        - name: WORKSPACE
                          value: /workspace
                        - name: workspace
                          value: /workspace
                        - name: GOPROXY
                          value: http://cache-service.nginx-pypi-cache.svc.cluster.local:8084|https://goproxy.cn|direct
                        - name: GOSUMDB
                          value: sum.golang.google.cn
                        - name: JOB_ID
                          value: job-5g-download
                        - name: BUILDNUMBER
                          value: "202406"
                        - name: MAX_JOBS
                          value: "1"
                        - name: CMAKE_BUILD_PARALLEL_LEVEL
                          value: "1"
                nodeSelector:
                    kubernetes.io/arch: amd64
                imagePullSecrets:
                    - name: huawei-swr-image-pull-secret-model-gy
                activeDeadlineSeconds: 14400
                securityContext:
                    runAsUser: 0
                restartPolicy: Never
