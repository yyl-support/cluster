apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
    generateName: testorg-testrepo-test27-
    labels:
        huawei.com/ascend-310: "1"
        huawei.com/npu: "true"
        jobPRID: "110"
        jobRepositoryName: testorg-testrepo-test27
        kubernetes.io/arch: arm64
        pipeline/run-id: test-310p3-123
spec:
    policies:
        - event: PodFailed
          action: AbortJob
    queue: shared-flexible-queue
    maxRetry: 1
    minAvailable: 1
    ttlSecondsAfterFinished: 1800
    tasks:
        - name: main-script
          replicas: 1
          maxRetry: 1
          template:
            spec:
                containers:
                    - name: ascend
                      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.2.rc1-310p-ubuntu22.04-py3.11
                      command:
                        - bash
                        - -c
                      args:
                        - |-
                          trap 'EXIT_CODE=$?; [ "$EXIT_CODE" -ne 0 ] && sleep 10' EXIT
                          #!/bin/bash

                          echo "Running on 310P3 NPU"
                          echo "Testing specific NPU chip type"
                          npu-smi info || echo "npu-smi not available"
                      workingDir: /workspace
                      resources:
                        limits:
                            huawei.com/ascend-310: "1"
                            memory: 32Gi
                        requests:
                            cpu: "8"
                            huawei.com/ascend-310: "1"
                            memory: 32Gi
                      volumeMounts:
                        - name: ascend-driver
                          mountPath: /usr/local/Ascend/driver
                          readOnly: true
                      env:
                        - name: WORKSPACE
                          value: /workspace
                        - name: workspace
                          value: /workspace
                        - name: GOPROXY
                          value: http://cache-service.nginx-pypi-cache.svc.cluster.local:8084|https://goproxy.cn|direct
                        - name: GOSUMDB
                          value: sum.golang.google.cn
                        - name: JOB_ID
                          value: job-310p3
                        - name: BUILDNUMBER
                          value: "202403"
                        - name: MAX_JOBS
                          value: "8"
                        - name: CMAKE_BUILD_PARALLEL_LEVEL
                          value: "8"
                nodeSelector:
                    kubernetes.io/arch: arm64
                    node.kubernetes.io/npu.chip.name: 310P3
                imagePullSecrets:
                    - name: huawei-swr-image-pull-secret-model-gy
                activeDeadlineSeconds: 14400
                securityContext:
                    runAsUser: 0
                volumes:
                    - name: ascend-driver
                      hostPath:
                        path: /usr/local/Ascend/driver
                restartPolicy: Never
