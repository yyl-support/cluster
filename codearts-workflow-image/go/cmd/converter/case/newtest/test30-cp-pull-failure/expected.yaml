apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
    generateName: testorg-testrepo-test30-
    labels:
        jobPRID: "130"
        jobRepositoryName: testorg-testrepo-test30
        kubernetes.io/arch: amd64
        pipeline/run-id: test30-cp-pull-failure-123
spec:
    policies:
        - event: PodFailed
          action: AbortJob
    queue: shared-flexible-queue
    maxRetry: 1
    minAvailable: 1
    ttlSecondsAfterFinished: 1800
    tasks:
        - name: main-script
          replicas: 1
          maxRetry: 1
          template:
            spec:
                containers:
                    - name: ascend
                      image: swr.cn-southwest-2.myhuaweicloud.com/nonexistent/invalid-image:does-not-exist
                      command:
                        - bash
                        - -c
                      args:
                        - |-
                          (trap 'EXIT_CODE=$?; [ "$EXIT_CODE" -ne 0 ] && sleep 10' EXIT
                          #!/bin/bash
                          echo "This script should never run due to image pull failure"
                          echo "Creating artifacts that won't be extracted..."
                          echo xxxx > test.txt
                          echo yyyy > debug.log

                          cd ${WORKSPACE}
                          cp -r --parents *.txt *.log /output/artifact/
                          ); _ec=$?; echo $_ec > /output/artifact/.ascend-done; exit $_ec
                      workingDir: /workspace
                      resources:
                        limits:
                            cpu: "1"
                            memory: 1Gi
                        requests:
                            cpu: "1"
                            memory: 1Gi
                      volumeMounts:
                        - name: output
                          mountPath: /output/artifact
                      env:
                        - name: WORKSPACE
                          value: /workspace
                        - name: workspace
                          value: /workspace
                        - name: GOPROXY
                          value: http://cache-service.nginx-pypi-cache.svc.cluster.local:8084|https://goproxy.cn|direct
                        - name: GOSUMDB
                          value: sum.golang.google.cn
                        - name: BUILDNUMBER
                          value: "20240330"
                        - name: MAX_JOBS
                          value: "1"
                        - name: CMAKE_BUILD_PARALLEL_LEVEL
                          value: "1"
                        - name: JOB_ID
                          value: job-test30
                    - name: copy-artifact
                      image: swr.cn-southwest-2.myhuaweicloud.com/modelfoundry/alpine:3.23.3
                      command:
                        - sh
                      args:
                        - -c
                        - |-
                          trap 'echo "Received TERM, exiting."; exit 0' TERM
                          TIMER_FILE="/tmp/reset_timer"
                          TIMEOUT_SEC=600
                          touch "$TIMER_FILE"
                          COUNT=0
                          while true; do
                            if [ -f "$DONE_FILE" ]; then
                              _ascend_exit=$(cat "$DONE_FILE" 2>/dev/null || echo "1")
                              echo "ascend container finished (exit $_ascend_exit)."
                              if [ "$_ascend_exit" != "0" ]; then
                                echo "ascend failed, exiting sidecar."
                                exit 0
                              fi
                            fi
                            LAST=$(stat -c %Y "$TIMER_FILE" 2>/dev/null || stat -f %m "$TIMER_FILE")
                            NOW=$(date +%s)
                            ELAPSED=$((NOW - LAST))
                            if [ "$ELAPSED" -ge "$TIMEOUT_SEC" ]; then
                              echo "Timer expired. Exiting."
                              exit 0
                            fi
                            COUNT=$((COUNT + 1))
                            if [ $((COUNT % 5)) -eq 0 ]; then
                              REMAINING=$((TIMEOUT_SEC - ELAPSED))
                              echo "Timer remaining: ${REMAINING}s"
                            fi
                            sleep 1
                          done
                      resources:
                        limits:
                            cpu: "2"
                            memory: 1Gi
                        requests:
                            cpu: 200m
                            memory: 200Mi
                      volumeMounts:
                        - name: output
                          mountPath: /output/artifact
                      env:
                        - name: DONE_FILE
                          value: /output/artifact/.ascend-done
                        - name: WORKSPACE
                          value: /workspace
                nodeSelector:
                    kubernetes.io/arch: amd64
                imagePullSecrets:
                    - name: huawei-swr-image-pull-secret-model-gy
                activeDeadlineSeconds: 14400
                securityContext:
                    runAsUser: 0
                volumes:
                    - name: output
                      emptyDir:
                        sizeLimit: 10Gi
                restartPolicy: Never
